{% csrf_token %}
<div class="alert alert-danger d-none" data-role="note-error-non-field"></div>
<div class="row g-3 mb-3">
    <div class="col-12 col-md-6">
        <label class="form-label" for="{{ form.start_time.id_for_label }}">{{ form.start_time.label }}</label>
        {{ form.start_time }}
        <div class="text-danger small mt-1 d-none" data-role="note-error-start"></div>
    </div>
    <div class="col-12 col-md-6">
        <label class="form-label" for="{{ form.end_time.id_for_label }}">{{ form.end_time.label }}</label>
        {{ form.end_time }}
        <div class="text-danger small mt-1 d-none" data-role="note-error-end"></div>
    </div>
</div>
<div class="mb-3">
    <label class="form-label" for="{{ form.comment.id_for_label }}">{{ form.comment.label }}</label>
    {{ form.comment }}
    <div class="text-danger small mt-1 d-none" data-role="note-error-comment"></div>
    <div class="form-text">Информационная заметка в календаре (без привязки к кабинету и специалисту). По умолчанию длительность 2 часа.</div>
</div>
